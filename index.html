<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toernooimaker - Deelnemers</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Toernooi</p>
        <h1>Toernooimaker</h1>
      </div>
    </header>

    <main class="app-shell">
      <section class="workspace" aria-live="polite">
        <div class="workspace-bar">
          <div>
            <p class="eyebrow" id="workspaceFormat">Geen schema</p>
            <h2 id="workspaceTitle">Maak je toernooi</h2>
          </div>
          <nav class="view-tabs" id="viewTabs" aria-label="Toernooi onderdelen"></nav>
        </div>
        <div id="statusMessage" class="status-message" hidden></div>
        <div id="tournamentContent" class="tournament-content"></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
